name: unidrop
description: UFCFS4-30-3 Creative Technologies Project.
publish_to: "none"
version: 4.0.0

environment:
  sdk: ">=3.11.0 <=3.11.3"

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8
  flutter_chat_types: ^3.6.2
  flutter_link_previewer: ^4.2.0
  flutter_riverpod: ^3.2.1
  mobile_scanner: ^7.2.0
  pretty_qr_code: ^3.4.0

  # Networking and server
  dio: ^5.8.0+1
  http: ^1.2.2
  network_info_plus: ^7.0.0
  shelf: ^1.4.1
  shelf_multipart: ^2.0.1
  shelf_router: ^1.1.4

  # File system and storage
  file_picker: ^10.3.10
  mime: ^2.0.0
  path: ^1.9.1
  path_provider: ^2.1.3
  archive: ^4.0.9

  # Device and security
  device_info_plus: ^12.3.0
  encrypt_shared_preferences: ^1.0.1
  local_auth: ^3.0.1
  permission_handler: ^12.0.1

  # Media processing
  image: ^4.5.4
  image_editor_plus: ^1.0.6
  image_gallery_saver_plus: ^4.0.1
  image_picker: ^1.0.7
  pro_image_editor: 12.0.4
  pro_video_editor: ^1.7.0

  cross_platform_video_thumbnails: ^0.1.1
  video_player: ^2.11.0

  # Utilities
  basic_utils: ^5.7.0
  logging: ^1.3.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
