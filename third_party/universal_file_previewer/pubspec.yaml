name: universal_file_previewer
description: Preview 50+ file formats (PDF, images, video, audio, code, zip, markdown, CSV, JSON and more) with zero heavy dependencies. Uses pure Dart + native platform channels.
version: 0.3.0
homepage: https://github.com/Naimish-Kumar/universal_file_previewer

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.example.universal_file_previewer
        pluginClass: FilePreviewerPlugin
      ios:
        pluginClass: FilePreviewerPlugin
        swiftPackage: FilePreviewerPlugin
      macos:
        pluginClass: FilePreviewerPlugin
        swiftPackage: FilePreviewerPlugin
      windows:
        pluginClass: FilePreviewerPlugin
      linux:
        pluginClass: FilePreviewerPlugin
      web:
        pluginClass: FilePreviewerWeb
        fileName: universal_file_previewer_web.dart

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.2.1
  path: ^1.9.0
  path_provider: ^2.1.3
  video_player: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
