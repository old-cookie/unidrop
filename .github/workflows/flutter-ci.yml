name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Flutter action
        uses: subosito/flutter-action@v2.22.0

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android release
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Flutter action
        uses: subosito/flutter-action@v2.22.0

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-bundle
          path: build/windows/x64/runner/Release/

  linux-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Flutter action
        uses: subosito/flutter-action@v2.22.0

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Build AppImage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/unidrop" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/unidrop.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=UniDrop
          Exec=unidrop
          Icon=unidrop
          Categories=Utility;
          Terminal=false
          EOF

          cp web/icons/Icon-512.png AppDir/unidrop.png

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage
          APPIMAGETOOL_APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool.AppImage AppDir unidrop-x86_64.AppImage

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: unidrop-x86_64.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-bundle
          path: build/linux/x64/release/bundle/

  macos-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Flutter action
        uses: subosito/flutter-action@v2.22.0

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-bundle
          path: build/macos/Build/Products/Release/

  ios-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Flutter action
        uses: subosito/flutter-action@v2.22.0

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-runner-app
          path: build/ios/iphoneos/Runner.app

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Flutter action
        uses: subosito/flutter-action@v2.22.0

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web release
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi
          flutter build web --release --base-href "$BASE_HREF"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  web-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: web-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

  publish-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - android-release
      - windows-release
      - linux-release
      - macos-release
      - ios-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist

      - name: Package release assets
        shell: bash
        run: |
          mkdir -p out
          cp dist/android-release-apk/app-release.apk out/unidrop-android-release.apk
          (cd dist/windows-release-bundle && zip -r ../../out/unidrop-windows-release.zip .)
          (cd dist/linux-release-bundle && zip -r ../../out/unidrop-linux-release.zip .)
          (cd dist/macos-release-bundle && zip -r ../../out/unidrop-macos-release.zip .)
          (cd dist/ios-release-runner-app && zip -r ../../out/unidrop-ios-runner-app.zip .)
          if [ -f dist/linux-appimage/unidrop-x86_64.AppImage ]; then
            cp dist/linux-appimage/unidrop-x86_64.AppImage out/
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ci-${{ github.run_number }}
          name: CI Build #${{ github.run_number }}
          generate_release_notes: true
          prerelease: true
          files: out/*
